name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    name: Build Backend
    runs-on: [self-hosted, Q/A]

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Verify Node.js
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present

  build-frontend:
    name: Build Frontend
    runs-on: [self-hosted, Q/A]

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify Node.js
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present
